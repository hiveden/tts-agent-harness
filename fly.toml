app = 'hiveden-tts'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  API_PORT = '8100'
  WEB_PORT = '3010'
  NEXT_PUBLIC_API_URL = 'http://localhost:8100'
  WHISPERX_URL = ''
  LOG_LEVEL = 'info'

app = 'hiveden-tts'
primary_region = 'nrt'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1

[env]
  LOG_LEVEL = 'info'
  WHISPERX_URL = ''
  # CORS not needed in prod (same-origin via Caddy)
  CORS_ORIGINS = ''
